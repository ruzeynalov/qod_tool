name: CI

on:
  push:
    branches: [main, 'phase-*/**', 'audit_fixes']
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build shared package
        run: npm run -w packages/shared build

      - name: Generate Prisma client
        run: npx -w packages/api prisma generate

      - name: Lint API
        run: npm run -w packages/api lint

      - name: Type check API
        run: npx -w packages/api tsc --noEmit

  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build shared package
        run: npm run -w packages/shared build

      - name: Generate Prisma client
        run: npx -w packages/api prisma generate

      - name: Run API tests with coverage
        run: cd packages/api && npx vitest run --coverage

      - name: Check coverage threshold
        run: |
          cd packages/api
          # Fail if overall line coverage is below 60%
          npx vitest run --coverage --reporter=json --outputFile=coverage-report.json 2>/dev/null || true
          node -e "
            const fs = require('fs');
            try {
              const cov = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
              const lines = cov.total.lines.pct;
              console.log('Line coverage: ' + lines + '%');
              if (lines < 60) {
                console.error('Coverage below 60% threshold');
                process.exit(1);
              }
            } catch (e) {
              console.warn('Could not read coverage summary, skipping threshold check');
            }
          "


  test-web:
    name: Web Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build shared package
        run: npm run -w packages/shared build

      - name: Run web tests
        run: cd packages/web && npx vitest run --passWithNoTests

  test-e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build shared package
        run: npm run -w packages/shared build

      - name: Install Playwright browsers
        run: cd packages/web && npx playwright install chromium --with-deps

      - name: Run Playwright tests
        run: cd packages/web && npx playwright test --project=chromium
        env:
          CI: true

      - name: Upload test report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/web/playwright-report/
          retention-days: 14

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: npm audit (block on critical, warn on high)
        run: npm audit --audit-level=critical

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [test-api]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (with layer caching)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          tags: qod-api:ci
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Web image (with layer caching)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.web
          tags: qod-web:ci
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
