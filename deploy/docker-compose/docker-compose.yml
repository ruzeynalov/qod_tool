# D2: Network segmentation — frontend (web+api), backend (api+postgres+redis)
# D4: JWT_SECRET and NEXTAUTH_SECRET require explicit setting in production
# D5/S9: Redis authentication enabled
# D9: PostgreSQL connection pooling
# D11: Redis persistence with AOF
# D12: Pinned PostgreSQL/TimescaleDB version
# D14: Resource limits for all services
# D28: Nginx reverse proxy for production
# D32: Web container health check

services:
  postgres:
    image: timescale/timescaledb:2.17.2-pg16
    environment:
      POSTGRES_USER: qod
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qod_dev_password}
      POSTGRES_DB: qod
    # D2: No host port mapping — only accessible from backend network
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U qod']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  redis:
    image: redis:7-alpine
    # D5/S9: Require password + D11: Enable AOF persistence
    command: redis-server --requirepass ${REDIS_PASSWORD:-qod_redis_dev} --appendonly yes
    # D2: No host port mapping — only accessible from backend network
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-qod_redis_dev}', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  # D3: Separate migration init job — runs once before API starts
  migrate:
    build:
      context: ../../
      dockerfile: docker/Dockerfile.api
    command: ['npx', 'prisma', 'migrate', 'deploy', '--schema=./prisma/schema.prisma']
    environment:
      DATABASE_URL: postgresql://qod:${POSTGRES_PASSWORD:-qod_dev_password}@postgres:5432/qod
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'
    networks:
      - backend

  # Seed default admin user and demo projects (idempotent — safe to re-run)
  seed:
    build:
      context: ../../
      dockerfile: docker/Dockerfile.api
    command: ['node', 'dist/database/seeds/seed.js']
    environment:
      DATABASE_URL: postgresql://qod:${POSTGRES_PASSWORD:-qod_dev_password}@postgres:5432/qod
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: 'no'
    networks:
      - backend

  # Populate demo projects with realistic test data + 30 days of KPI history
  # (idempotent — skips a project if it already has demo-seeded test cases).
  demo-seed:
    build:
      context: ../../
      dockerfile: docker/Dockerfile.api
    command: ['node', 'dist/database/seeds/demo-seed.js']
    environment:
      DATABASE_URL: postgresql://qod:${POSTGRES_PASSWORD:-qod_dev_password}@postgres:5432/qod
    depends_on:
      seed:
        condition: service_completed_successfully
    restart: 'no'
    networks:
      - backend

  api:
    build:
      context: ../../
      dockerfile: docker/Dockerfile.api
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: production
      # D9: Connection pooling parameters
      DATABASE_URL: postgresql://qod:${POSTGRES_PASSWORD:-qod_dev_password}@postgres:5432/qod?connection_limit=10&pool_timeout=30
      # D5/S9: Redis URL with authentication
      REDIS_URL: redis://:${REDIS_PASSWORD:-qod_redis_dev}@redis:6379
      # D4: JWT_SECRET — MUST be changed in production
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-jwt-secret}
      # S10: CREDENTIALS_ENCRYPTION_KEY — MUST be changed in production
      # Generate with: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
      CREDENTIALS_ENCRYPTION_KEY: ${CREDENTIALS_ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      PORT: '4000'
    depends_on:
      demo-seed:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'node -e "fetch(\"http://localhost:4000/api/v1/health\").then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  web:
    build:
      context: ../../
      dockerfile: docker/Dockerfile.web
    environment:
      NEXTAUTH_URL: http://localhost:3000
      # D4: NEXTAUTH_SECRET — MUST be changed in production
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production-nextauth-secret}
    depends_on:
      api:
        condition: service_healthy
    # D32: Web container health check
    healthcheck:
      test: ['CMD-SHELL', 'node -e "fetch(\"http://localhost:3000\").then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - frontend
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  # D28: Reverse proxy — routes /api/* to api service, everything else to web
  # For production use, add SSL termination and rate limiting
  nginx:
    image: nginx:1.27-alpine
    ports:
      - '127.0.0.1:9090:80'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'

volumes:
  pgdata:
  redisdata:

# D2: Explicit network segmentation
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
