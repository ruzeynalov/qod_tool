# D28: Basic reverse proxy for QOD
# For production: add SSL termination (certbot/Let's Encrypt), rate limiting,
# and security headers. Consider using a dedicated ingress controller for k8s.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    upstream api_backend {
        server api:4000;
    }

    upstream web_frontend {
        server web:3000;
    }

    # Security headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;

    server {
        listen 80;
        server_name _;

        # API requests
        location /api/ {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Keep a generous ceiling for long-running API operations.
            # Manual connector syncs are queued asynchronously, but this
            # prevents false 504s for existing deployments and large exports.
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # WebSocket (Socket.IO) endpoint
        location /live {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
        }

        # Frontend (catch-all)
        location / {
            proxy_pass http://web_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
